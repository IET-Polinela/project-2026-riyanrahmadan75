<h1>Halaman Laporan</h1>

<a href="{% url 'add_report' %}">+ Tambah Laporan</a>

<hr>

{% for report in reports %}
    <div>
        <h3>{{ report.title }}</h3>
        <p>{{ report.description }}</p>
        <p>{{ report.location }}</p>
        <hr>
    </div>
{% empty %}
    <p>Belum ada laporan</p>
{% endfor %}
