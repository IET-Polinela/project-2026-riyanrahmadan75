<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
        .border-dashed { border-style: dashed !important; border-width: 2px !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Judul Masalah</label>
                            <input type="text" id="reportTitle" class="form-control" placeholder="Contoh: Jalan Berlubang Parah" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Kategori</label>
                            <select id="reportCategory" class="form-select" required>
                                <option value="Kebersihan">Kebersihan</option>
                                <option value="Infrastruktur">Infrastruktur</option>
                                <option value="Keamanan">Keamanan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Lokasi Kejadian</label>
                            <input type="text" id="reportLocation" class="form-control" placeholder="Contoh: Jl. Sukarame Raya Blok C" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Deskripsi Kronologi</label>
                            <textarea id="reportDescription" class="form-control" rows="4" placeholder="Jelaskan detail kronologi masalah..." required></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" id="btnDraft" class="btn btn-outline-secondary fw-bold">Simpan Draft</button>
                            <button type="button" id="btnSubmit" class="btn btn-primary fw-bold">
                                <i class="bi bi-send-fill me-1"></i>Ajukan Laporan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 🎯 TRIK SAKTI: Ditambahkan buster '?v=1000' agar GitHub Pages wajib memuat ulang kode paling baru -->
    <script src="js/api.js?v=1000"></script>
    <script src="js/auth.js?v=1000"></script>
    <script src="js/router.js?v=1000"></script>
    <script src="js/app.js?v=1000"></script>
</body>
</html>
