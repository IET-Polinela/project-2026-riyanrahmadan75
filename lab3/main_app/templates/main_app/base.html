<!DOCTYPE html>
<html>
<head>
    <title>Sistem Pelaporan</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #2563eb;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background: #1e1e2f;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            margin: 0;
            font-size: 18px;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        /* CONTAINER */
        .container {
            padding: 30px 60px;
        }

        /* BUTTON */
        .btn {
            padding: 8px 16px;
           background: #4f46e5;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-danger {
            background: #ef4444;
        }

        /* CARD (INI YANG BIKIN TIPIS & ELEGAN) */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;

            /* ini bikin halus */
            border: 1px solid #e5e7eb;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
        }

    </style>

</head>

<body>

    <div class="navbar">
        <h2>Sistem Pelaporan</h2>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about/">About</a>
            <a href="/contacts/">Contacts</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
