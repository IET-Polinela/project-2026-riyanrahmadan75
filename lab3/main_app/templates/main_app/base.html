<!DOCTYPE html>
<html>
<head>
    <title>Sistem Pelaporan</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg,#1e293b,#2563eb);
            margin: 0;
        }

        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
        }

        .navbar h2 {
            color: white;
        }

        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .container {
            padding: 40px;
        }

        h1 {
            color: white;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            width: 400px;
        }

        .btn {
            padding: 8px 12px;
            background: #4f46e5;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn-danger {
            background: #ef4444;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
        }

    </style>
</head>

<body>

<div class="navbar">
    <h2>Sistem Pelaporan</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/contacts/">Contacts</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
