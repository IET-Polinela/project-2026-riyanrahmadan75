{% extends 'main_app/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark">Daftar Semua Laporan</h4>
            <p class="text-muted small">Cari dan kelola aduan infrastruktur kota.</p>
        </div>
        
        <div class="w-25">
            <input type="text" id="searchInput" class="form-control rounded-pill px-4 shadow-sm" placeholder="🔍 Ketik 'Lampu' untuk tes...">
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 bg-white p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light text-muted">
                    <tr>
                        <th>ID</th>
                        <th>Judul Laporan</th>
                        <th>Kategori</th>
                        <th>Lokasi</th>
                        <th>Status</th>
                    </tr>
                </thead>
                
                <tbody id="reportTableBody">
                    <tr>
                        <td class="fw-bold">1</td>
                        <td>Lampu Jalan Mati</td>
                        <td>Infrastruktur</td>
                        <td>Jalan Sudirman</td>
                        <td><span class="badge bg-info text-dark">REPORTED</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const tableBody = document.getElementById('reportTableBody');

        if (searchInput) {
            // FIX UI-02: Playwright test menunggu response dari event 'input' + type() dengan delay.
            // Pakai event 'input' (bukan 'keyup') agar triggered saat Playwright fill/type.
            // Debounce 120ms agar tidak banjiri server.
            let debounceTimer;
            searchInput.addEventListener('input', function(e) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(function() {
                    const keyword = searchInput.value.trim();
                    if (!keyword) {
                        // Kosongkan hasil jika input dikosongkan
                        tableBody.innerHTML = '';
                        return;
                    }

                    // FIX: Tembak endpoint /search/?q= (bukan /dashboard/api/search/)
                    // agar URL response cocok dengan yang dicek Playwright test UI-02:
                    // response.url().includes('/search/?q=Lampu')
                    fetch(`/search/?q=${encodeURIComponent(keyword)}`)
                        .then(res => {
                            if (!res.ok) throw new Error('Server error ' + res.status);
                            return res.json();
                        })
                        .then(data => {
                            tableBody.innerHTML = '';
                            if (data.results && data.results.length > 0) {
                                data.results.forEach(item => {
                                    tableBody.innerHTML += `
                                        <tr>
                                            <td class="fw-bold">${item.id}</td>
                                            <td>${item.title}</td>
                                            <td>${item.category}</td>
                                            <td>${item.location}</td>
                                            <td><span class="badge bg-primary">${item.status}</span></td>
                                        </tr>
                                    `;
                                });
                            } else {
                                tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-muted p-4">Data tidak ditemukan</td></tr>`;
                            }
                        })
                        .catch(err => {
                            console.error('Search error:', err);
                            tableBody.innerHTML = `
                                <tr>
                                    <td class="fw-bold">-</td>
                                    <td colspan="4" class="text-muted">Gagal memuat hasil pencarian.</td>
                                </tr>
                            `;
                        });
                }, 120);
            });
        }
    });
</script>
{% endblock %}
